version: "3.9"

services:

  redis:
    image: redis:latest
    container_name: redis-server

    ports:
      - "6379:6379"

    restart: unless-stopped

  gateway:
    build: .

    container_name: distributed-rate-limiter

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - redis

    restart: unless-stopped